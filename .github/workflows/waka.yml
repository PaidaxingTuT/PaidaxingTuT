name: Waka Readme

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          
          # 总行数与总时长
          SHOW_LINES_OF_CODE: "True" 
          SHOW_TOTAL_CODE_TIME: "True"
          
          # 其他所有模块
          SHOW_EDITORS: "False"            # 关闭编辑器统计
          SHOW_DAYS_OF_WEEK: "False"       # 关闭周几写代码的偏好统计
          SHOW_SHORT_INFO: "False"         # 关闭 Github 账号简略信息
          SHOW_UPDATED_DATE: "False"       # 关闭最后更新日期
          SHOW_COMMIT: "False"             # 关闭作息时间统计
          SHOW_PROFILE_VIEWS: "False"      # 关闭访客统计
          SHOW_LANGUAGE: "False"           # 关闭语言统计
          SHOW_OS: "False"                 # 关闭操作系统统计
          SHOW_PROJECTS: "False"           # 关闭项目统计
          SHOW_TIMEZONE: "False"           # 关闭时区
          SHOW_LANGUAGE_PER_REPO: "False"  # 关闭每个仓库的语言统计
